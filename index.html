<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spin Wheel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fecfef, #fecfef);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}
#wheelBox {
  position: relative;
  margin: 10px 0;
}
#wheel {
  border-radius: 50%;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  background: #fff;
}
#arrow {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 30px solid #ff4757;
  z-index: 10;
}
#centerDot {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 24px; height: 24px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 5;
}
#controls {
  background: #fff;
  border-radius: 16px;
  padding: 18px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
#nameInput {
  width: 100%;
  padding: 14px;
  font-size: 17px;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  margin-bottom: 10px;
  outline: none;
  -webkit-appearance: none;
}
#nameInput:focus { border-color: #ff6b6b; }
.row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.btn {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  color: #fff;
  cursor: pointer;
  -webkit-appearance: none;
}
#addBtn { background: #4ecdc4; }
#spinBtn {
  width: 100%;
  background: linear-gradient(90deg, #ff6b6b, #feca57);
  font-size: 18px;
  letter-spacing: 2px;
}
#spinBtn:disabled { opacity: 0.5; }
#namesBox {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
  max-height: 120px;
  overflow-y: auto;
}
.tag {
  background: #ff6b6b;
  color: #fff;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tag .x { cursor: pointer; font-size: 18px; line-height: 1; }
#overlay {
  display: none;
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
#overlay.active { display: flex; }
#popup {
  background: #fff;
  padding: 40px 30px;
  border-radius: 20px;
  text-align: center;
  width: 85%;
  max-width: 350px;
  animation: pop 0.4s ease;
}
@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
#popup h2 {
  font-size: 16px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 10px;
}
#popup p {
  font-size: 36px;
  font-weight: 800;
  color: #ff6b6b;
  margin-bottom: 25px;
  word-break: break-word;
}
#popup button {
  background: #4ecdc4;
  color: #fff;
  border: none;
  padding: 12px 30px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
}
</style>
</head>
<body>

<div id="wheelBox">
  <div id="arrow"></div>
  <canvas id="wheel" width="320" height="320"></canvas>
  <div id="centerDot"></div>
</div>

<div id="controls">
  <input type="text" id="nameInput" placeholder="Enter name...">
  <div class="row">
    <button class="btn" id="addBtn" onclick="add()">Add</button>
    <button class="btn" style="background:#ff9ff3" onclick="clearAll()">Clear</button>
  </div>
  <div id="namesBox"></div>
  <button class="btn" id="spinBtn" onclick="spin()" disabled>SPIN!</button>
</div>

<div id="overlay" onclick="closePop()">
  <div id="popup" onclick="event.stopPropagation()">
    <h2>Winner</h2>
    <p id="winName"></p>
    <button onclick="closePop()">OK</button>
  </div>
</div>

<script>
var names = ['Alice','Bob','Charlie','Diana'];
var colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F8B739','#52B788','#FF8FAB','#A0C4FF'];
var c = document.getElementById('wheel');
var ctx = c.getContext('2d');
var rot = 0;
var spinning = false;

function draw() {
  var w = c.width, h = c.height;
  var cx = w/2, cy = h/2, r = Math.min(w,h)/2 - 8;
  ctx.clearRect(0,0,w,h);
  if(names.length === 0) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#f0f0f0'; ctx.fill();
    ctx.fillStyle='#aaa'; ctx.font='14px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Add names',cx,cy-8);
    ctx.fillText('to spin!',cx,cy+10);
    return;
  }
  var slice = (Math.PI*2)/names.length;
  for(var i=0;i<names.length;i++){
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,i*slice,(i+1)*slice);
    ctx.closePath();
    ctx.fillStyle=colors[i%colors.length]; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
    var mid = i*slice + slice/2;
    var tx = cx + Math.cos(mid)*r*0.6;
    var ty = cy + Math.sin(mid)*r*0.6;
    ctx.save(); ctx.translate(tx,ty); ctx.rotate(mid+Math.PI/2);
    ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var txt = names[i].length>12 ? names[i].slice(0,10)+'..' : names[i];
    ctx.fillText(txt,0,0); ctx.restore();
  }
}

function show() {
  var box = document.getElementById('namesBox');
  box.innerHTML = '';
  for(var i=0;i<names.length;i++){
    var d = document.createElement('div');
    d.className = 'tag';
    d.style.background = colors[i%colors.length];
    d.innerHTML = names[i] + '<span class="x" onclick="remove('+i+')"> &times;</span>';
    box.appendChild(d);
  }
  document.getElementById('spinBtn').disabled = names.length < 2 || spinning;
  draw();
}

function add() {
  var inp = document.getElementById('nameInput');
  var n = inp.value.trim();
  if(!n) return;
  if(names.indexOf(n) !== -1) { inp.value=''; return; }
  names.push(n); inp.value=''; show();
}

function remove(i) {
  names.splice(i,1); show();
}

function clearAll() {
  names = []; show();
}

function spin() {
  if(spinning || names.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  var extra = 5 + Math.random()*3;
  var off = Math.random() * (360/names.length);
  var target = rot + extra*360 + off;
  c.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
  c.style.transform = 'rotate('+target+'deg)';
  rot = target;
  setTimeout(function(){
    var actual = rot % 360;
    var slice = 360/names.length;
    var idx = Math.floor((360 - actual + slice/2)/slice) % names.length;
    document.getElementById('winName').textContent = names[idx];
    document.getElementById('overlay').classList.add('active');
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
  }, 4000);
}

function closePop() {
  document.getElementById('overlay').classList.remove('active');
}

document.getElementById('nameInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') add();
});

show();
</script>
</body>
</html>
