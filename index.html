
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vinnarmaskinen - Grodracet</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }

  /* Flikar */
  .tab-container { display: flex; gap: 5px; margin-bottom: 20px; width: 100%; max-width: 600px; flex-wrap: wrap; }
  .tab-btn { flex: 1; min-width: 80px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; font-size: 0.8em; }
  .tab-btn.active { background: #3498db; color: white; }

  /* Kontroller */
  .controls { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; z-index: 10; }
  input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; }
  .btns { display: flex; gap: 10px; margin-bottom: 15px; }
  .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; }
  
  /* Spelytor */
  .game-content { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
  .game-content.active { display: flex; }

  /* 1. Lyckohjul */
  #wheelBox { position: relative; margin: 20px 0; }
  #wheel { border-radius: 50%; border: 5px solid #fff; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
  #arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #e74c3c; z-index: 10; }
  
  /* 4. GRODRACET - NY DESIGN */
  #frog-track { 
    width: 100%; 
    height: 450px; 
    background: #27ae60; /* Grönt gräs */
    border-radius: 15px; 
    position: relative; 
    overflow: hidden;
    border-top: 15px solid #3498db; /* Vattenmål */
    padding: 0 10px;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
  }
  .water-line {
    position: absolute; top: 0; left: 0; width: 100%; height: 40px;
    background: #3498db;
    display: flex; justify-content: center; align-items: center;
    color: white; font-weight: bold; font-size: 12px; letter-spacing: 2px;
  }
  .frog-lane { height: 100%; width: 70px; position: relative; border-left: 1px dashed rgba(255,255,255,0.2); }
  .frog { 
    position: absolute; bottom: 0; left: 50%; 
    transform: translateX(-50%); 
    font-size: 50px; 
    transition: bottom 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
    display: flex; flex-direction: column; align-items: center; 
  }
  .frog-name-tag {
    background: rgba(255,255,255,0.9); color: black; padding: 2px 6px;
    border-radius: 10px; font-size: 11px; font-weight: bold; margin-bottom: 2px;
    white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  /* Popup */
  .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:100; text-align:center; }
  .pop { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; }
</style>
</head>
<body>

  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('wheel-game', this)">Hjul</button>
    <button class="tab-btn" onclick="switchTab('confetti-game', this)">Konfetti</button>
    <button class="tab-btn" onclick="switchTab('balloon-game', this)">Ballong</button>
    <button class="tab-btn" onclick="switchTab('frog-game', this)">Grodrace</button>
  </div>

  <div class="controls">
    <input type="text" id="nameInp" placeholder="Skriv namn...">
    <div class="btns">
      <button class="btn" style="background:#3498db" onclick="addName()">Lägg till</button>
      <button class="btn" style="background:#95a5a6" onclick="clearAll()">Rensa</button>
    </div>
    <button id="actionBtn" class="btn" style="background:#2ecc71; width:100%; font-size: 1.2em;" onclick="play()">STARTA!</button>
  </div>

  <div id="wheel-game" class="game-content active"><div id="wheelBox"><div id="arrow"></div><canvas id="wheel" width="300" height="300"></canvas></div></div>
  <div id="confetti-game" class="game-content"><div id="luckyBox" style="background:#34495e; width:280px; height:180px; border-radius:20px; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; padding:15px;"></div></div>
  <div id="balloon-game" class="game-content"><div id="balloon-area" style="width:100%; height:350px; background:#87CEEB; border-radius:20px; position:relative; overflow:hidden;"></div></div>
  
  <div id="frog-game" class="game-content">
    <div id="frog-track">
      <div class="water-line">MÅL (DAMMEN)</div>
      <!-- Grodor läggs till här -->
    </div>
  </div>

  <div id="winnerOverlay" class="overlay" onclick="this.style.display='none'">
    <div class="pop"><h2>VINNARE!</h2><p id="winText" style="font-size:2.5em; font-weight:bold; color:#2ecc71; margin:15px 0;"></p><button class="btn" style="background:#3498db; width:100%">Härligt!</button></div>
  </div>

<script>
  let names = ['Björn', 'Anna', 'Lars', 'Maria'];
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9'];
  let currentRot = 0;
  let activeTab = 'wheel-game';

  function switchTab(tabId, btn) {
    activeTab = tabId;
    document.querySelectorAll('.game-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    render();
  }

  function addName() {
    const inp = document.getElementById('nameInp');
    if(inp.value.trim()) { names.push(inp.value.trim()); inp.value = ''; render(); }
  }

  function clearAll() { names = []; render(); }

  function render() {
    if(activeTab === 'wheel-game') drawWheel();
    else if(activeTab === 'confetti-game') drawConfetti();
    else if(activeTab === 'balloon-game') drawBalloons();
    else drawFrogs();
  }

  function play() {
    if(names.length < 1) return;
    const btn = document.getElementById('actionBtn');
    btn.disabled = true;

    if(activeTab === 'wheel-game') {
      const extra = 1800 + Math.random() * 1800;
      currentRot += extra;
      document.getElementById('wheel').style.transform = `rotate(${currentRot}deg)`;
      setTimeout(() => {
        const actualDeg = currentRot % 360;
        const sliceDeg = 360 / names.length;
        const winIdx = Math.floor(((360 - actualDeg) + 270) % 360 / sliceDeg);
        showWinner(names[winIdx]);
        btn.disabled = false;
      }, 4000);
    } 
    else if(activeTab === 'frog-game') {
      startFrogRace(btn);
    }
    else if(activeTab === 'confetti-game') {
      document.getElementById('luckyBox').classList.add('shaking');
      setTimeout(() => {
        document.getElementById('luckyBox').classList.remove('shaking');
        showWinner(names[Math.floor(Math.random() * names.length)]);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        btn.disabled = false;
      }, 2000);
    }
    else if(activeTab === 'balloon-game') {
      startBalloons(btn);
    }
  }

  // --- GRODRACE LOGIK ---
  function drawFrogs() {
    const track = document.getElementById('frog-track');
    const water = track.querySelector('.water-line');
    track.innerHTML = '';
    track.appendChild(water);

    names.forEach((name, i) => {
      const lane = document.createElement('div');
      lane.className = 'frog-lane';
      lane.innerHTML = `
        <div class="frog" id="frog-${i}" style="bottom: 0px;">
          <span class="frog-name-tag">${name}</span>
          🐸
        </div>`;
      track.appendChild(lane);
    });
  }

  function startFrogRace(btn) {
    const frogs = names.map((_, i) => ({ id: i, pos: 0 }));
    let raceInterval = setInterval(() => {
      let winnerFound = false;
      frogs.forEach(frog => {
        // Grodor hoppar! De rör sig inte linjärt utan i språng.
        if (Math.random() > 0.7) {
            frog.pos += Math.random() * 40 + 10; 
            const el = document.getElementById(`frog-${frog.id}`);
            el.style.bottom = frog.pos + 'px';
        }
        
        if(frog.pos >= 380) winnerFound = true;
      });

      if(winnerFound) {
        clearInterval(raceInterval);
        const winner = frogs.reduce((prev, curr) => (curr.pos > prev.pos) ? curr : prev);
        setTimeout(() => {
          showWinner(names[winner.id]);
          confetti({ particleCount: 150, spread: 70 });
          btn.disabled = false;
          render();
        }, 500);
      }
    }, 150);
  }

  // --- BALLONG LOGIK ---
  function drawBalloons() {
    const area = document.getElementById('balloon-area');
    area.innerHTML = '';
    names.forEach((name, i) => {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.position = 'absolute';
      b.style.width = '50px'; b.style.height = '65px';
      b.style.borderRadius = '50%';
      b.style.left = (Math.random() * 80 + 5) + '%';
      b.style.background = colors[i % colors.length];
      b.style.bottom = '10px';
      b.style.display = 'flex'; b.style.justifyContent = 'center'; b.style.alignItems = 'center';
      b.style.color = 'white'; b.style.fontSize = '10px'; b.style.fontWeight = 'bold';
      b.innerText = name.substring(0,5);
      area.appendChild(b);
    });
  }

  function startBalloons(btn) {
    const area = document.getElementById('balloon-area');
    area.innerHTML = '';
    let active = names.map((name, i) => {
      const b = document.createElement('div');
      b.style.position = 'absolute';
      b.style.width = '50px'; b.style.height = '65px';
      b.style.borderRadius = '50%';
      b.style.left = (Math.random() * 80 + 5) + '%';
      b.style.background = colors[i % colors.length];
      b.style.bottom = '0px';
      b.style.transition = 'bottom 3s ease-out, transform 0.2s, opacity 0.2s';
      b.style.display = 'flex'; b.style.justifyContent = 'center'; b.style.alignItems = 'center';
      b.style.color = 'white'; b.style.fontSize = '12px'; b.style.fontWeight = 'bold';
      b.innerText = name;
      area.appendChild(b);
      setTimeout(() => b.style.bottom = (Math.random() * 200 + 50) + 'px', 50);
      return { el: b, name: name };
    });

    let interval = setInterval(() => {
      if(active.length > 1) {
        let idx = Math.floor(Math.random() * active.length);
        let popped = active.splice(idx, 1)[0];
        popped.el.style.transform = 'scale(2)'; popped.el.style.opacity = '0';
        setTimeout(() => popped.el.remove(), 200);
      } else {
        clearInterval(interval);
        showWinner(active[0].name);
        confetti({ particleCount: 100, origin: { y: 0.5 } });
        btn.disabled = false;
        setTimeout(render, 2000);
      }
    }, 800);
  }

  // --- GEMENSAMMA FUNKTIONER ---
  function drawWheel() {
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const slice = (Math.PI*2) / names.length;
    ctx.clearRect(0,0,300,300);
    names.forEach((name, i) => {
      ctx.beginPath(); ctx.fillStyle = colors[i % colors.length];
      ctx.moveTo(150,150); ctx.arc(150,150, 145, i*slice, (i+1)*slice);
      ctx.fill(); ctx.strokeStyle = "white"; ctx.stroke();
      ctx.save(); ctx.translate(150,150); ctx.rotate(i*slice + slice/2);
      ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif";
      ctx.textAlign = "right"; ctx.fillText(name.substring(0,10), 130, 5);
      ctx.restore();
    });
  }

  function drawConfetti() {
    const box = document.getElementById('luckyBox');
    box.innerHTML = '';
    names.forEach(n => {
      const s = document.createElement('span');
      s.style.background = '#e74c3c'; s.style.color = 'white';
      s.style.padding = '5px 10px'; s.style.margin = '2px';
      s.style.borderRadius = '5px'; s.innerText = n; s.style.fontSize = '12px';
      box.appendChild(s);
    });
  }

  function showWinner(name) {
    document.getElementById('winText').innerText = name;
    document.getElementById('winnerOverlay').style.display = 'flex';
  }

  render();
</script>
</body>
</html>
