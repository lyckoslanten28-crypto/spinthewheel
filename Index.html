<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vinnarmaskinen V2</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }

  /* Flikar */
  .tab-container { display: flex; gap: 5px; margin-bottom: 20px; width: 100%; max-width: 600px; flex-wrap: wrap; }
  .tab-btn { flex: 1; min-width: 80px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; font-size: 0.8em; }
  .tab-btn.active { background: #3498db; color: white; }

  /* Kontroller */
  .controls { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; z-index: 10; }
  input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; }
  .btns { display: flex; gap: 10px; margin-bottom: 15px; }
  .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; }
  
  /* Spelytor */
  .game-content { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
  .game-content.active { display: flex; }

  /* 1. Lyckohjul */
  #wheelBox { position: relative; margin: 20px 0; }
  #wheel { border-radius: 50%; border: 5px solid #fff; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
  #arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #e74c3c; z-index: 10; }
  
  /* 4. RALLY - NY DESIGN */
  #rally-track { 
    width: 100%; 
    height: 450px; 
    background: #333; 
    border-radius: 15px; 
    position: relative; 
    overflow: hidden;
    border-top: 10px solid #f1c40f; /* Mållinje */
    padding: 0 10px;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
  }
  .finish-line {
    position: absolute; top: 0; left: 0; width: 100%; height: 30px;
    background-image: linear-gradient(45deg, #fff 25%, transparent 25%), 
                      linear-gradient(-45deg, #fff 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #fff 75%),
                      linear-gradient(-45deg, transparent 75%, #fff 75%);
    background-size: 20px 20px; background-color: #000;
  }
  .car-lane { height: 100%; width: 60px; position: relative; border-left: 1px dashed #555; }
  .car { 
    position: absolute; bottom: 0; left: 50%; 
    transform: translateX(-50%); 
    font-size: 40px; /* Större bilar */
    transition: bottom 0.1s linear; 
    display: flex; flex-direction: column; align-items: center; 
  }
  .car-name-tag {
    background: rgba(255,255,255,0.9); color: black; padding: 2px 5px;
    border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 5px;
    white-space: nowrap;
  }

  /* Popup */
  .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:100; text-align:center; }
  .pop { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; }
</style>
</head>
<body>

  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('wheel-game', this)">Hjul</button>
    <button class="tab-btn" onclick="switchTab('confetti-game', this)">Konfetti</button>
    <button class="tab-btn" onclick="switchTab('balloon-game', this)">Ballong</button>
    <button class="tab-btn" onclick="switchTab('rally-game', this)">Rally</button>
  </div>

  <div class="controls">
    <input type="text" id="nameInp" placeholder="Skriv namn...">
    <div class="btns">
      <button class="btn" style="background:#3498db" onclick="addName()">Lägg till</button>
      <button class="btn" style="background:#95a5a6" onclick="clearAll()">Rensa</button>
    </div>
    <button id="actionBtn" class="btn" style="background:#2ecc71; width:100%; font-size: 1.2em;" onclick="play()">STARTA!</button>
  </div>

  <div id="wheel-game" class="game-content active"><div id="wheelBox"><div id="arrow"></div><canvas id="wheel" width="300" height="300"></canvas></div></div>
  <div id="confetti-game" class="game-content"><div id="luckyBox" style="background:#34495e; width:280px; height:180px; border-radius:20px; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; padding:15px;"></div></div>
  <div id="balloon-game" class="game-content"><div id="balloon-area" style="width:100%; height:350px; background:#87CEEB; border-radius:20px; position:relative; overflow:hidden;"></div></div>
  
  <div id="rally-game" class="game-content">
    <div id="rally-track">
      <div class="finish-line"></div>
      </div>
  </div>

  <div id="winnerOverlay" class="overlay" onclick="this.style.display='none'">
    <div class="pop"><h2>VINNARE!</h2><p id="winText" style="font-size:2.5em; font-weight:bold; color:#e74c3c; margin:15px 0;"></p><button class="btn" style="background:#3498db; width:100%">Stäng</button></div>
  </div>

<script>
  let names = ['Björn', 'Anna', 'Lars', 'Maria'];
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9'];
  let currentRot = 0;
  let activeTab = 'wheel-game';

  function switchTab(tabId, btn) {
    activeTab = tabId;
    document.querySelectorAll('.game-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    render();
  }

  function addName() {
    const inp = document.getElementById('nameInp');
    if(inp.value.trim()) { names.push(inp.value.trim()); inp.value = ''; render(); }
  }

  function clearAll() { names = []; render(); }

  function render() {
    if(activeTab === 'wheel-game') drawWheel();
    else if(activeTab === 'confetti-game') drawConfetti();
    else if(activeTab === 'balloon-game') drawBalloons();
    else drawRally();
  }

  function play() {
    if(names.length < 1) return;
    const btn = document.getElementById('actionBtn');
    btn.disabled = true;

    if(activeTab === 'wheel-game') {
      const extra = 1800 + Math.random() * 1800;
      currentRot += extra;
      document.getElementById('wheel').style.transform = `rotate(${currentRot}deg)`;
      setTimeout(() => {
        const actualDeg = currentRot % 360;
        const sliceDeg = 360 / names.length;
        const winIdx = Math.floor(((360 - actualDeg) + 270) % 360 / sliceDeg);
        showWinner(names[winIdx]);
        btn.disabled = false;
      }, 4000);
    } 
    else if(activeTab === 'rally-game') {
      startRally(btn);
    }
    // ... övriga spel (confetti/ballonger) körs enligt tidigare logik
  }

  // --- RALLY LOGIK (UPPDATERAD) ---
  function drawRally() {
    const track = document.getElementById('rally-track');
    // Behåll målflaggan, ta bort gamla banor
    const finish = track.querySelector('.finish-line');
    track.innerHTML = '';
    track.appendChild(finish);

    names.forEach((name, i) => {
      const lane = document.createElement('div');
      lane.className = 'car-lane';
      lane.innerHTML = `
        <div class="car" id="car-${i}" style="bottom: 0px;">
          <span class="car-name-tag">${name}</span>
          🏎️
        </div>`;
      track.appendChild(lane);
    });
  }

  function startRally(btn) {
    const cars = names.map((_, i) => ({ id: i, pos: 0 }));
    let raceInterval = setInterval(() => {
      let winnerFound = false;
      cars.forEach(car => {
        // Slumpmässig fart
        car.pos += Math.random() * 8; 
        const el = document.getElementById(`car-${car.id}`);
        el.style.bottom = car.pos + 'px';
        
        // Mållinjen är ca 380px upp
        if(car.pos >= 380) winnerFound = true;
      });

      if(winnerFound) {
        clearInterval(raceInterval);
        const winner = cars.reduce((prev, curr) => (curr.pos > prev.pos) ? curr : prev);
        setTimeout(() => {
          showWinner(names[winner.id]);
          confetti({ particleCount: 150, spread: 70 });
          btn.disabled = false;
          render();
        }, 500);
      }
    }, 50);
  }

  // --- STANDARD FUNKTIONER ---
  function drawWheel() {
    const canvas = document.getElementById('wheel');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const slice = (Math.PI*2) / names.length;
    ctx.clearRect(0,0,300,300);
    names.forEach((name, i) => {
      ctx.beginPath(); ctx.fillStyle = colors[i % colors.length];
      ctx.moveTo(150,150); ctx.arc(150,150, 145, i*slice, (i+1)*slice);
      ctx.fill(); ctx.strokeStyle = "white"; ctx.stroke();
      ctx.save(); ctx.translate(150,150); ctx.rotate(i*slice + slice/2);
      ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif";
      ctx.textAlign = "right"; ctx.fillText(name.substring(0,10), 130, 5);
      ctx.restore();
    });
  }

  function showWinner(name) {
    document.getElementById('winText').innerText = name;
    document.getElementById('winnerOverlay').style.display = 'flex';
  }

  function drawConfetti() { /* Samma som förut */ }
  function drawBalloons() { /* Samma som förut */ }

  render();
</script>
</body>
</html>
