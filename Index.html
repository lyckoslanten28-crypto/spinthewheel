<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Välj Spel - Lyckohjul eller Konfetti</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
  body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }

  /* Flikar / Tabs */
  .tab-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
  .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #ddd; transition: 0.3s; }
  .tab-btn.active { background: #3498db; color: white; }

  /* Gemensamma Kontroller */
  .controls { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 8px; outline: none; font-size: 16px; }
  input:focus { border-color: #3498db; }
  .btns { display: flex; gap: 10px; margin-bottom: 15px; }
  .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; }
  .btn:active { transform: scale(0.98); }
  
  /* Spelytor */
  .game-content { display: none; flex-direction: column; align-items: center; width: 100%; }
  .game-content.active { display: flex; }

  /* Lyckohjul Design */
  #wheelBox { position: relative; margin: 20px 0; }
  #wheel { border-radius: 50%; border: 5px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.15); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
  #arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #e74c3c; z-index: 10; }
  
  /* Konfetti Design */
  .box { background: #34495e; width: 100%; max-width: 300px; height: 180px; border: 4px dashed #7f8c8d; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; padding: 15px; margin: 20px; position: relative; overflow: hidden; }
  .name-tag { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; margin: 3px; font-size: 0.8em; animation: shake 0.5s infinite; }
  @keyframes shake { 0% {transform: translate(0,0)} 50% {transform: translate(1px, 1px)} 100% {transform: translate(0,0)} }
  .shaking { animation: box-shake 0.1s infinite; }
  @keyframes box-shake { 0% { transform: rotate(1deg); } 50% { transform: rotate(-1deg); } }

  /* Overlay / Vinnare */
  .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:100; color:white; text-align:center; padding: 20px; }
  .pop { background: white; color: #333; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; }
  .pop h2 { color: #888; font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; }
  .pop p { font-size: 2.5em; font-weight: bold; margin: 15px 0; color: #e74c3c; word-break: break-word; }
</style>
</head>
<body>

  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('wheel-game', this)">Lyckohjul</button>
    <button class="tab-btn" onclick="switchTab('confetti-game', this)">Konfetti</button>
  </div>

  <div class="controls">
    <input type="text" id="nameInp" placeholder="Skriv namn...">
    <div class="btns">
      <button class="btn" style="background:#3498db" onclick="addName()">Lägg till</button>
      <button class="btn" style="background:#95a5a6" onclick="clearAll()">Rensa</button>
    </div>
    <button id="actionBtn" class="btn" style="background:#2ecc71; width:100%; font-size: 1.2em;" onclick="play()">STARTA!</button>
  </div>

  <div id="wheel-game" class="game-content active">
    <div id="wheelBox">
      <div id="arrow"></div>
      <canvas id="wheel" width="300" height="300"></canvas>
    </div>
  </div>

  <div id="confetti-game" class="game-content">
    <div id="luckyBox" class="box"></div>
    <p style="color: #7f8c8d; font-size: 0.9em;">Namnen skakas och en vinnare dras!</p>
  </div>

  <div id="winnerOverlay" class="overlay" onclick="this.style.display='none'">
    <div class="pop">
      <h2>Vinnare</h2>
      <p id="winText"></p>
      <button class="btn" style="background:#3498db; width:100%">OK</button>
    </div>
  </div>

<script>
  let names = ['Björn', 'Anna', 'Lars', 'Maria'];
  const colors = ['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db','#1abc9c','#ff9ff3','#54a0ff','#5f27cd'];
  let currentRot = 0;
  let activeTab = 'wheel-game';

  // Växla flikar
  function switchTab(tabId, btn) {
    activeTab = tabId;
    document.querySelectorAll('.game-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    render();
  }

  // Rita hjulet
  function drawWheel() {
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const slice = (Math.PI*2) / names.length;
    ctx.clearRect(0,0,300,300);
    
    if(names.length === 0) {
      ctx.fillStyle = "#ccc";
      ctx.textAlign = "center";
      ctx.fillText("Lägg till namn", 150, 150);
      return;
    }

    names.forEach((name, i) => {
      ctx.beginPath();
      ctx.fillStyle = colors[i % colors.length];
      ctx.moveTo(150,150);
      ctx.arc(150,150, 145, i*slice, (i+1)*slice);
      ctx.fill();
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.save();
      ctx.translate(150,150);
      ctx.rotate(i*slice + slice/2);
      ctx.fillStyle = "white";
      ctx.font = "bold 14px sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(name.substring(0,12), 130, 5);
      ctx.restore();
    });
  }

  // Rita konfetti-boxens innehåll
  function drawConfetti() {
    const box = document.getElementById('luckyBox');
    box.innerHTML = '';
    names.forEach(n => {
      const span = document.createElement('span');
      span.className = 'name-tag';
      span.innerText = n;
      box.appendChild(span);
    });
  }

  function render() {
    if(activeTab === 'wheel-game') drawWheel();
    else drawConfetti();
  }

  function addName() {
    const inp = document.getElementById('nameInp');
    if(inp.value.trim()) {
      names.push(inp.value.trim());
      inp.value = '';
      render();
    }
  }

  function clearAll() {
    names = [];
    render();
  }

  function play() {
    if(names.length < 2) return;
    const btn = document.getElementById('actionBtn');
    btn.disabled = true;

    if(activeTab === 'wheel-game') {
      const extra = 1800 + Math.random() * 1800;
      currentRot += extra;
      document.getElementById('wheel').style.transform = `rotate(${currentRot}deg)`;
      
      setTimeout(() => {
        const actualDeg = currentRot % 360;
        const sliceDeg = 360 / names.length;
        const winIdx = Math.floor(((360 - actualDeg) + 270) % 360 / sliceDeg);
        showWinner(names[winIdx]);
        btn.disabled = false;
      }, 4000);
    } else {
      const box = document.getElementById('luckyBox');
      box.classList.add('shaking');
      setTimeout(() => {
        box.classList.remove('shaking');
        const winner = names[Math.floor(Math.random() * names.length)];
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        showWinner(winner);
        btn.disabled = false;
      }, 2000);
    }
  }

  function showWinner(name) {
    document.getElementById('winText').innerText = name;
    document.getElementById('winnerOverlay').style.display = 'flex';
  }

  // Lyssna på Enter-tangenten
  document.getElementById('nameInp').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addName();
  });

  render();
</script>
</body>
</html>
