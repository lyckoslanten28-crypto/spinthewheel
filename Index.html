<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vinnarmaskinen Deluxe</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; overflow-x: hidden; }

  /* Flikar */
  .tab-container { display: flex; gap: 5px; margin-bottom: 20px; width: 100%; max-width: 600px; flex-wrap: wrap; }
  .tab-btn { flex: 1; min-width: 80px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; font-size: 0.8em; }
  .tab-btn.active { background: #3498db; color: white; }

  /* Kontroller */
  .controls { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; z-index: 10; }
  input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; }
  .btns { display: flex; gap: 10px; margin-bottom: 15px; }
  .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; }
  
  /* Spelytor */
  .game-content { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; position: relative; }
  .game-content.active { display: flex; }

  /* 1. Lyckohjul */
  #wheelBox { position: relative; margin: 20px 0; }
  #wheel { border-radius: 50%; border: 5px solid #fff; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
  #arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #e74c3c; z-index: 10; }
  
  /* 2. Konfetti */
  .box { background: #34495e; width: 280px; height: 180px; border: 4px dashed #7f8c8d; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; padding: 15px; margin: 20px; overflow: hidden; }
  .shaking { animation: box-shake 0.1s infinite; }
  @keyframes box-shake { 0% { transform: rotate(1deg); } 50% { transform: rotate(-1deg); } }

  /* 3. Ballonger */
  #balloon-area { width: 100%; height: 350px; position: relative; overflow: hidden; background: #87CEEB; border-radius: 20px; }
  .balloon { position: absolute; bottom: -100px; width: 50px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 10px; }

  /* 4. Rally */
  #rally-track { width: 100%; background: #555; border-radius: 10px; padding: 10px; position: relative; border-right: 10px solid gold; }
  .lane { height: 40px; border-bottom: 1px dashed #777; position: relative; display: flex; align-items: center; width: 100%; }
  .car { position: absolute; left: 0; font-size: 24px; transition: left 0.1s linear; display: flex; align-items: center; white-space: nowrap; }
  .car-name { font-size: 10px; color: white; margin-left: 5px; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; }

  /* Popup */
  .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:100; text-align:center; }
  .pop { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; }
  .pop p { font-size: 2.5em; font-weight: bold; margin: 15px 0; color: #e74c3c; }
</style>
</head>
<body>

  <div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('wheel-game', this)">Hjul</button>
    <button class="tab-btn" onclick="switchTab('confetti-game', this)">Konfetti</button>
    <button class="tab-btn" onclick="switchTab('balloon-game', this)">Ballong</button>
    <button class="tab-btn" onclick="switchTab('rally-game', this)">Rally</button>
  </div>

  <div class="controls">
    <input type="text" id="nameInp" placeholder="Namn...">
    <div class="btns">
      <button class="btn" style="background:#3498db" onclick="addName()">+ Lägg till</button>
      <button class="btn" style="background:#95a5a6" onclick="clearAll()">Rensa</button>
    </div>
    <button id="actionBtn" class="btn" style="background:#2ecc71; width:100%; font-size: 1.2em;" onclick="play()">STARTA!</button>
  </div>

  <div id="wheel-game" class="game-content active"><div id="wheelBox"><div id="arrow"></div><canvas id="wheel" width="300" height="300"></canvas></div></div>
  <div id="confetti-game" class="game-content"><div id="luckyBox" class="box"></div></div>
  <div id="balloon-game" class="game-content"><div id="balloon-area"></div></div>
  <div id="rally-game" class="game-content"><div id="rally-track"></div></div>

  <div id="winnerOverlay" class="overlay" onclick="this.style.display='none'">
    <div class="pop"><h2>VINNARE</h2><p id="winText"></p><button class="btn" style="background:#3498db; width:100%">Grattis!</button></div>
  </div>

<script>
  let names = ['Björn', 'Anna', 'Lars', 'Maria'];
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9'];
  let currentRot = 0;
  let activeTab = 'wheel-game';

  function switchTab(tabId, btn) {
    activeTab = tabId;
    document.querySelectorAll('.game-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    render();
  }

  function addName() {
    const inp = document.getElementById('nameInp');
    if(inp.value.trim()) { names.push(inp.value.trim()); inp.value = ''; render(); }
  }

  function clearAll() { names = []; render(); }

  function render() {
    if(activeTab === 'wheel-game') drawWheel();
    else if(activeTab === 'confetti-game') drawConfetti();
    else if(activeTab === 'balloon-game') drawBalloons();
    else drawRally();
  }

  function play() {
    if(names.length < 2) return;
    const btn = document.getElementById('actionBtn');
    btn.disabled = true;

    if(activeTab === 'wheel-game') {
      const extra = 1800 + Math.random() * 1800;
      currentRot += extra;
      document.getElementById('wheel').style.transform = `rotate(${currentRot}deg)`;
      setTimeout(() => {
        const actualDeg = currentRot % 360;
        const sliceDeg = 360 / names.length;
        const winIdx = Math.floor(((360 - actualDeg) + 270) % 360 / sliceDeg);
        showWinner(names[winIdx]);
        btn.disabled = false;
      }, 4000);
    } 
    else if(activeTab === 'confetti-game') {
      document.getElementById('luckyBox').classList.add('shaking');
      setTimeout(() => {
        document.getElementById('luckyBox').classList.remove('shaking');
        showWinner(names[Math.floor(Math.random() * names.length)]);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        btn.disabled = false;
      }, 2000);
    }
    else if(activeTab === 'balloon-game') startBalloons(btn);
    else if(activeTab === 'rally-game') startRally(btn);
  }

  // --- RALLY LOGIK ---
  function drawRally() {
    const track = document.getElementById('rally-track');
    track.innerHTML = '';
    names.forEach((name, i) => {
      const lane = document.createElement('div');
      lane.className = 'lane';
      lane.innerHTML = `<div class="car" id="car-${i}">🏎️<span class="car-name">${name}</span></div>`;
      track.appendChild(lane);
    });
  }

  function startRally(btn) {
    const cars = names.map((_, i) => ({ id: i, pos: 0 }));
    let raceInterval = setInterval(() => {
      let winnerFound = false;
      cars.forEach(car => {
        car.pos += Math.random() * 5;
        const el = document.getElementById(`car-${car.id}`);
        el.style.left = car.pos + '%';
        if(car.pos >= 85) winnerFound = true;
      });

      if(winnerFound) {
        clearInterval(raceInterval);
        const winner = cars.reduce((prev, curr) => (curr.pos > prev.pos) ? curr : prev);
        setTimeout(() => {
          showWinner(names[winner.id]);
          confetti({ particleCount: 150, spread: 70 });
          btn.disabled = false;
          render();
        }, 500);
      }
    }, 50);
  }

  // --- BALLONG LOGIK ---
  function drawBalloons() {
    const area = document.getElementById('balloon-area');
    area.innerHTML = '';
    names.forEach((name, i) => {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = (Math.random() * 80 + 5) + '%';
      b.style.background = colors[i % colors.length];
      b.style.bottom = '10px';
      b.innerText = name.substring(0,5);
      area.appendChild(b);
    });
  }

  function startBalloons(btn) {
    const area = document.getElementById('balloon-area');
    area.innerHTML = '';
    let active = names.map((name, i) => {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = (Math.random() * 80 + 5) + '%';
      b.style.background = colors[i % colors.length];
      b.style.transition = 'bottom 3s ease-out';
      b.innerText = name;
      area.appendChild(b);
      setTimeout(() => b.style.bottom = (Math.random() * 200 + 50) + 'px', 50);
      return { el: b, name: name };
    });

    let interval = setInterval(() => {
      if(active.length > 1) {
        let idx = Math.floor(Math.random() * active.length);
        let popped = active.splice(idx, 1)[0];
        popped.el.style.transform = 'scale(2)'; popped.el.style.opacity = '0';
        setTimeout(() => popped.el.remove(), 200);
      } else {
        clearInterval(interval);
        showWinner(active[0].name);
        confetti({ particleCount: 100, origin: { y: 0.5 } });
        btn.disabled = false;
        setTimeout(render, 2000);
      }
    }, 800);
  }

  // --- GEMENSAMMA FUNKTIONER ---
  function drawWheel() {
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const slice = (Math.PI*2) / names.length;
    ctx.clearRect(0,0,300,300);
    names.forEach((name, i) => {
      ctx.beginPath(); ctx.fillStyle = colors[i % colors.length];
      ctx.moveTo(150,150); ctx.arc(150,150, 145, i*slice, (i+1)*slice);
      ctx.fill(); ctx.strokeStyle = "white"; ctx.stroke();
      ctx.save(); ctx.translate(150,150); ctx.rotate(i*slice + slice/2);
      ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif";
      ctx.textAlign = "right"; ctx.fillText(name.substring(0,10), 130, 5);
      ctx.restore();
    });
  }

  function drawConfetti() {
    const box = document.getElementById('luckyBox');
    box.innerHTML = '';
    names.forEach(n => {
      const s = document.createElement('span');
      s.className = 'name-tag';
      s.style.background = '#e74c3c'; s.style.color = 'white';
      s.style.padding = '5px 10px'; s.style.margin = '2px';
      s.style.borderRadius = '5px'; s.innerText = n;
      box.appendChild(s);
    });
  }

  function showWinner(name) {
    document.getElementById('winText').innerText = name;
    document.getElementById('winnerOverlay').style.display = 'flex';
  }

  render();
</script>
</body>
</html>
